name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version metadata
        run: |
          TAG="${{ github.ref_name }}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG does not match manifest.json version $MANIFEST_VERSION"; exit 1
          fi
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"; exit 1
          fi
          node -e "const v=require('./versions.json'); if(!v['$TAG']){console.error('::error::versions.json has no entry for $TAG');process.exit(1)}"

      - name: Build release assets
        run: npm run build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: true

      - name: Attest release assets
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
